# Boots the full pipeline infrastructure on a single host.
# Full pipeline:        docker compose up -d
# Dashboard-only work:  docker compose up -d postgres grafana
services:

  # ---------- Ingestion: Kafka (KRaft mode, no Zookeeper) ----------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"   # host access (producer)
      - "9094:9094"   # internal access (spark container)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://kafka:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---------- Source: synthetic event producer ----------
  producer:
    build: ./producer
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: "kafka:9094"
    restart: unless-stopped

  # ---------- Processing: Spark (custom image, JARs baked in, auto-submits) ----------
  spark:
    build: ./spark
    container_name: spark
    user: root
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    environment:
      KAFKA_HOST: "kafka"
      KAFKA_PORT: "9094"
    volumes:
      - ./spark:/app          # stream_processor.py available at /app
      - ./data:/data          # parquet history written here
    restart: unless-stopped

  # ---------- Storage: PostgreSQL (live views / alerts) ----------
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: secu
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: securitydb
    volumes:
      - ./spark/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secu -d securitydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Visualization: Grafana (dashboard) ----------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: securitydb
      GF_DATABASE_USER: secu
      GF_DATABASE_PASSWORD: secret
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboard/grafana/provisioning:/etc/grafana/provisioning
      - ./dashboard/grafana/dashboards:/var/lib/grafana/dashboards


volumes:
  pgdata:
  grafana_data: